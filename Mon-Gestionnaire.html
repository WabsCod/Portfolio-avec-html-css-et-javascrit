<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire personnel de mon budget</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gestionnaire de Mon Budget</h1>
            <p>Projet en JAVASCRIPT</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Ajouter une Transaction</h2>
                <form action="" id="transactionForm">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Ex: Salaire, Loyer, Courses...">
                    </div>

                    <div class="form-group">
                        <label for="amount">Montant (FCFA)</label>
                        <input type="number" id="amount" placeholder="0" required step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="type">Type</label>
                        <select name="" id="type" required>
                            <option value="">-- Choisir --</option>
                            <option value="revenue">Revenu</option>
                            <option value="expense">Depense</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="category">Categorie</label>
                        <select name="" id="category" required>
                            <option value="">-- Choisir --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" placeholder="0" required>
                    </div>

                    <button type="submit" class="btn" id="submitBtn">Ajouter a Transaction</button>
                </form>
            </div>
             <!-- statistique -->
            <div class="card">
                <h2>Statistiques</h2>
                <div class="stats">
                    <div class="stat-box revenue">
                        <h3>Total Revenu</h3>
                        <div class="amount" id="totalExpense">0 FCFA</div>
                    </div>
                    <div class="stat-box expense">
                        <h3>Total Depense</h3>
                        <div class="amount" id="totalExpense">0 FCFA</div>
                    </div>
                    <div class="stat-box revenue">
                        <h3>Solde</h3>
                        <div class="amount" id="totalExpense">0 FCFA</div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
